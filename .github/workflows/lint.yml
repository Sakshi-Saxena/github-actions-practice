#What is the goal of this workflow?
#Goal: whenever code is changed, the linter will check if the syntax, format, indentation(Linting) is correct or not.

name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code:
    runs-on: ubuntu-latest
    steps:
      #this step will automatically clone the code of the current branch into the runner
      - name: Checkout/Clone the code
        uses: actions/checkout@v7

        #This step will install linting tool
      - name: Install Linter
        run: pip install ruff
        
