#What is the goal of this workflow?
#Goal: whenever code is changed, the linter will check if the syntax, format, indentation(Linting) is correct or not.

name: Auto Linter

on:
  push:
    paths: "*.py"

jobs:
  code-linting:
    runs-on: ubuntu-latest
    steps:
      #this step will automatically clone the code of the current branch into the runner
      - name: Checkout/Clone the code
        uses: actions/checkout@v7

        #This will setup python
      - name: SEt up python
        uses: actions/setup-python@v5
        with:
          python-version: '3.14'

        #This step will install linting tool
      - name: Install Linter
        run: pip install ruff

        #This step will run the linter
      - name: Check the files for linting
        run: ruff check .
        
